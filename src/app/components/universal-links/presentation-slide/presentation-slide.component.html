<div class="slide">
  <div class="slide-header">
    <span class="slide-counter">{{ slideNumber }} / {{ totalSlides }}</span>
  </div>

  <div class="slide-body">
    <ng-content />
  </div>

  <div class="navigation">
    <button class="nav-btn" (click)="onPrev()" [disabled]="slideNumber === 1">
      ← Prev
    </button>
    <button class="nav-btn" (click)="onNext()" [disabled]="slideNumber === totalSlides">
      Next →
    </button>
  </div>
</div>
